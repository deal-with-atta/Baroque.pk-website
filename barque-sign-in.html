<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - Barque - International</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex lg:justify-center">
      <div>
        <div class="flex justify-center p-8 lg:p-7">
          <img
            class="w-50 h-13"
            src="https://baroque.com.pk/cdn/shop/files/LOGO_PNG_V01_25cb20c8-1961-4b81-8a3b-e59bdeadee82.png?v=1754662487"
          />
        </div>
        <div class="lg:my-12 my-55 lg:mx-36 p-11">
          <div>
            <h1 class="flex justify-start font-bold text-2xl">Sign in</h1>
            <p class="flex justify-start pt-1 pb-4 text-[gray]">
              Sign in or create an account
            </p>
          </div>
          <div class="flex justify-center">
            <div
              class="flex justify-center items-center mb-2 font-bold w-94 h-12 rounded-lg text-white bg-[#5433EB]"
            >
              <h3>Continue with shop</h3>
            </div>
          </div>
          <div class="flex justify-center text-[#727272] items-center gap-2">
            <div
              class="w-[170px] h-[1px] border solid-1 border-[#D6D6D6]"
            ></div>
            <p>or</p>
            <div
              class="w-[175px] h-[1px] border solid-1 border-[#D6D6D6]"
            ></div>
          </div>
          <div class="flex justify-center pb-3">
            <input
              class="flex justify-center w-94 h-12 mt-2 pl-2 border solid-1 border-[#D6D6D6] rounded-lg"
              placeholder="Email"
            />
            <div class="w-5 absolute mt-6 ml-80">
              <a href="">
                <svg
                  class="w-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <!--!Font Awesome Free v7.2.0 by @font awesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                  <path
                    fill="#000000"
                    d="M566.6 342.6C579.1 330.1 579.1 309.8 566.6 297.3L406.6 137.3C394.1 124.8 373.8 124.8 361.3 137.3C348.8 149.8 348.8 170.1 361.3 182.6L466.7 288L96 288C78.3 288 64 302.3 64 320C64 337.7 78.3 352 96 352L466.7 352L361.3 457.4C348.8 469.9 348.8 490.2 361.3 502.7C373.8 515.2 394.1 515.2 406.6 502.7L566.6 342.7z"
                  />
                </svg>
              </a>
            </div>
          </div>
          <div class="flex justify-start gap-2 py-3">
            <input type="checkbox" />
            <span>Email me with news and offers</span>
          </div>
          <div class="flex justify-center py-3 text-xs">
            <p class="flex text-[gray]">by continuing, you agree to our</p>
            <a href="https://www.youtube.com/ " target="_blank"
              >Terms of Services</a
            >
          </div>
        </div>
        <div class="flex justify-center">
          <span class="flex justify-center">Privacy policy</span>
        </div>
      </div>
    </div>
  </body>
</html>
